{% extends "base.html" %}
{% block content %}
<h2>Документы</h2>

<!-- Форма добавления документа -->
<div class="card mb-4">
    <div class="card-header">Добавить документ</div>
    <div class="card-body">
        <form id="addDocForm">
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" class="form-control" id="docTitle" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Текст</label>
                <textarea class="form-control" id="docText" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Добавить</button>
        </form>
    </div>
</div>

<!-- Таблица документов -->
<h4>Список документов</h4>
<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Дата создания</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody id="docsTable"></tbody>
</table>

<!-- Модальное окно для просмотра -->
<div class="modal fade" id="docModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <pre id="modalText"></pre>
            </div>
        </div>
    </div>
</div>

<script>
// Загрузка документов
fetch('/kb/documents')
    .then(r => r.json())
    .then(docs => {
        const tbody = document.getElementById('docsTable');
        docs.forEach(doc => {
            tbody.innerHTML += `
                <tr>
                    <td>${doc.id}</td>
                    <td>${doc.title}</td>
                    <td>${doc.created_at}</td>
                    <td>
                        <button class="btn btn-sm btn-info me-2" onclick="viewDoc(${doc.id}, '${doc.title.replace(/'/g, "\\'")}')">Открыть</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteDoc(${doc.id})">Удалить</button>
                    </td>
                </tr>
            `;
        });
    });

// Добавление документа
document.getElementById('addDocForm').onsubmit = function(e) {
    e.preventDefault();
    fetch('/kb/documents', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            title: document.getElementById('docTitle').value,
            text: document.getElementById('docText').value
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            alert('Документ добавлен!');
            location.reload();
        }
    });
};

// Просмотр документа
function viewDoc(id, title) {
    fetch('/kb/documents/' + id)
        .then(r => r.json())
        .then(doc => {
            document.getElementById('modalTitle').textContent = doc.title;
            document.getElementById('modalText').textContent = doc.text;
            new bootstrap.Modal(document.getElementById('docModal')).show();
        });
}

// Удаление документа
function deleteDoc(id) {
    if (!confirm('Вы уверены, что хотите удалить этот документ?')) return;

    fetch('/kb/documents/' + id, {
        method: 'DELETE'
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'ok') {
            alert('Документ удалён!');
            location.reload();
        } else {
            alert('Ошибка при удалении: ' + (data.error || 'Неизвестная ошибка'));
        }
    })
    .catch(err => {
        alert('Ошибка при удалении: ' + err);
    });
}
</script>
{% endblock %}
