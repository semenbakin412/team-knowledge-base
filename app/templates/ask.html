{% extends "base.html" %}
{% block content %}
<h2>Задать вопрос</h2>

<div class="card mb-4">
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label">Ваш вопрос</label>
            <input type="text" class="form-control" id="questionInput" placeholder="Например: Какие инструменты использует команда?">
        </div>
        <button class="btn btn-primary" onclick="askQuestion()">Спросить</button>
        <button class="btn btn-secondary ms-2" onclick="clearQuestion()">Очистить</button>
    </div>
</div>

<div id="result" style="display:none;">
    <h4>Ответ:</h4>
    <div id="answerText"></div>
    
    <h5 class="mt-3">Источники:</h5>
    <ul id="sourcesList"></ul>
    
    <div id="reviewBadge"></div>
</div>

<script>
async function askQuestion() {
    const question = document.getElementById('questionInput').value;
    if (!question) return alert('Введите вопрос');
    
    const response = await fetch('/kb/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question})
    });
    
    const data = await response.json();
    
    document.getElementById('result').style.display = 'block';
    document.getElementById('answerText').textContent = data.answer;
    
    // Источники
    const sourcesList = document.getElementById('sourcesList');
    sourcesList.innerHTML = '';
    if (data.sources && data.sources.length > 0) {
        data.sources.forEach(src => {
            sourcesList.innerHTML += `<li>Документ #${src.document_id}: "${src.quote}"</li>`;
        });
    } else {
        sourcesList.innerHTML = '<li>Источники не найдены</li>';
    }
    
    // Бейдж ручной проверки
    const badge = document.getElementById('reviewBadge');
    if (data.needs_review) {
        badge.innerHTML = '<div class="needs-review">Требует проверки: данных недостаточно</div>';
    } else {
        badge.innerHTML = '<div class="alert alert-success">Ответ сформирован на основе документов</div>';
    }
}

// Очистка полей
function clearQuestion() {
    document.getElementById('questionInput').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('answerText').textContent = '';
    document.getElementById('sourcesList').innerHTML = '';
    document.getElementById('reviewBadge').innerHTML = '';
}
</script>
{% endblock %}
